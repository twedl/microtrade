repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML
          - polars>=1.20
          - pyarrow>=17
          - typer>=0.12
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        files: ^src/microtrade/
